general {
  gaps_in          = 3
  gaps_out         = 6
  border_size      = 1
  col.active_border   = rgba(9b59d0ff)
  col.inactive_border = rgba(1a1a1aff)
  layout           = dwindle
  resize_on_border = true
}

decoration {
  rounding = 0
  blur {
    enabled = false
  }
}

animations {
  enabled = true
  bezier  = tui, 0.0, 0.0, 1.0, 1.0
  animation = windows,    1, 2, tui, slide
  animation = windowsOut, 1, 2, tui, popin 95%
  animation = fade,       1, 3, tui
  animation = workspaces, 1, 3, tui, slide
  animation = border,     1, 5, tui
}
