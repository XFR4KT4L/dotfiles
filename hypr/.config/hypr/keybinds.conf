# ============================================================
#  keybinds.conf
# ============================================================
$mod     = SUPER
$term    = kitty
$menu    = wofi --show drun
$browser = zen-browser

# ── Esenciales ────────────────────────────────────────────
bind = $mod,       Q,       exec,         $term
bind = $mod,       C,       killactive
bind = $mod,       E,       exec,         thunar
bind = $mod,       D,       exec,         $menu
bind = $mod,       W,       exec,         $browser
bind = $mod,       F,       fullscreen,   0
bind = $mod SHIFT, Space,   togglefloating
bind = $mod CTRL,  Space,   pin
bind = $mod,       P,       pseudo
bind = $mod SHIFT, R,       exec,         hyprctl reload

# ── Sesión ────────────────────────────────────────────────
bind = $mod,       L,       exec, hyprlock
bind = $mod SHIFT, E,       exec, wlogout --protocol layer-shell

# ── Portapapeles ──────────────────────────────────────────
bind = $mod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ── Capturas ──────────────────────────────────────────────
bind = ,           Print,   exec, grim -g "$(slurp)" - | swappy -f -
bind = SHIFT,      Print,   exec, grim - | swappy -f -
bind = $mod,       Print,   exec, grim -o DP-1 - | swappy -f -
bind = $mod SHIFT, Print,   exec, grim -o DP-2 - | swappy -f -
#bind = $mod SHIFT, C        exec, hyprpicker -a

# ── Foco ──────────────────────────────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# ── Mover ventanas ────────────────────────────────────────
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# ── Entre monitores ───────────────────────────────────────
bind = $mod,       comma,  focusmonitor, DP-1
bind = $mod,       period, focusmonitor, DP-2
bind = $mod ALT,   H,      movewindow,   mon:DP-1
bind = $mod ALT,   L,      movewindow,   mon:DP-2

# ── Workspaces ────────────────────────────────────────────
bind = $mod, 0, workspace, 10 
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# ── Resize ────────────────────────────────────────────────
bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -30 0
binde = , L, resizeactive,  30 0
binde = , K, resizeactive,  0 -30
binde = , J, resizeactive,  0  30
bind  = , Escape, submap, reset
submap = reset

# ── Audio ─────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous

# ── Ratón (mover/redimensionar flotantes) ─────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Wallpaper ─────────────────────────────────────────────
bind = CTRL SUPER, left, exec, awww img --outputs DP-1 --transition-type fade --transition-duration 2 $(ls $HOME/.config/hypr/wallpapers/ | shuf -n1 | xargs -I{} echo $HOME/.config/hypr/wallpapers/{})
bind = ALT SUPER, right, exec, awww img --outputs DP-2 --transition-type fade --transition-duration 2 $(ls $HOME/.config/hypr/wallpapers/ | shuf -n1 | xargs -I{} echo $HOME/.config/hypr/wallpapers/{})
