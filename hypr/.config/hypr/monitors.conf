# ============================================================
#  monitors.conf — Dual monitor NVIDIA RTX 3070
#
#  ANTES DE ARRANCAR: verifica los nombres con `hyprctl monitors`
#  Con NVIDIA pueden ser DP-1/DP-2 en vez de DP-1/DP-2
#
#  Sintaxis: monitor=nombre,resolución@hz,posición_x+y,escala
# ============================================================

# DP-1 → 4K 60Hz (izquierda, principal)
# Escala 1.5 = se comporta como 1440p, texto nítido y bien proporcionado
monitor = DP-1, 3840x2160@60, 0x0, 1.5

# DP-2 → 2K 360Hz (derecha, gaming)
# Escala 1 = resolución nativa, máximo rendimiento para juegos
# Posición X = 3840/1.5 = 2560 (ancho lógico real del 4K)
monitor = DP-2, 2560x1440@360, 2560x0, 1

# ── Fallback: si no detecta los monitores, descomenta: ────
# monitor = DP-1, 3840x2160@60,  0x0,    1.5
# monitor = DP-2, 2560x1440@360, 2560x0, 1
