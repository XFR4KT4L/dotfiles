# ============================================================
#  hyprlock.conf — Catppuccin Mocha
#  Se aplica automáticamente a ambos monitores
# ============================================================

general {
  disable_loading_bar = true
  hide_cursor          = true
  grace                = 0
  no_fade_in           = false
}

background {
  monitor     =
  path        = screenshot
  blur_passes = 3
  blur_size   = 7
  brightness  = 0.6
  vibrancy    = 0.2
}

# ── Hora ──────────────────────────────────────────────────
label {
  monitor     =
  text        = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
  font_size   = 96
  font_family = JetBrains Mono Bold
  color       = rgba(cdd6f4ff)
  shadow_passes = 2
  shadow_size   = 4
  position    = 0, 120
  halign      = center
  valign      = center
}

# ── Fecha ─────────────────────────────────────────────────
label {
  monitor     =
  text        = cmd[update:60000] echo "$(date +"%A, %d de %B")"
  font_size   = 22
  font_family = JetBrains Mono
  color       = rgba(a6adc8ff)
  position    = 0, 40
  halign      = center
  valign      = center
}

# ── Campo de contraseña ───────────────────────────────────
input-field {
  monitor           =
  size              = 300, 50
  outline_thickness = 2
  dots_size         = 0.3
  dots_spacing      = 0.2
  dots_center       = true
  dots_rounding     = -1
  outer_color       = rgba(45475aff)
  inner_color       = rgba(1e1e2eff)
  font_color        = rgba(cdd6f4ff)
  fade_on_empty     = true
  placeholder_text  = <span foreground="##a6adc8">Contraseña...</span>
  check_color       = rgba(a6e3a1ff)
  fail_color        = rgba(f38ba8ff)
  fail_text         = <i>Incorrecto ($ATTEMPTS)</i>
  rounding          = 12
  position          = 0, -80
  halign            = center
  valign            = center
}

# ── Usuario ───────────────────────────────────────────────
label {
  monitor     =
  text        = $USER
  font_size   = 14
  font_family = JetBrains Mono
  color       = rgba(cba6f7ff)
  position    = 0, -140
  halign      = center
  valign      = center
}
